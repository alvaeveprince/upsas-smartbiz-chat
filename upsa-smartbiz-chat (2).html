<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UPSA SmartBiz Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:        #d4537e;
      --pink-light:  #f4c0d1;
      --pink-pale:   #fbeaf0;
      --scarlet:     #c0392b;
      --scarlet-dk:  #a93226;
      --cream:       #fdf6ed;
      --cream-dk:    #f5ead8;
      --white:       #ffffff;
      --text:        #2e1a24;
      --text-muted:  #9a7080;
      --border:      #eecdd8;
      --shadow:      rgba(180, 80, 110, 0.12);
    }

    html, body {
      height: 100%;
      background: var(--cream);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      background:
        radial-gradient(ellipse 60% 40% at 10% 10%, #f9dde8 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 90% 90%, #fde8d0 0%, transparent 60%),
        var(--cream);
    }

    /* ── CARD WRAPPER ── */
    .chat-card {
      width: 100%;
      max-width: 420px;
      height: 620px;
      display: flex;
      flex-direction: column;
      border-radius: 24px;
      overflow: hidden;
      box-shadow:
        0 2px 0 var(--border),
        0 8px 32px var(--shadow),
        0 24px 64px rgba(180,80,110,0.08);
      background: var(--white);
      animation: slideUp .4s ease both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── HEADER ── */
    header {
      background: var(--pink);
      padding: 18px 22px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        -45deg,
        rgba(255,255,255,0.04) 0,
        rgba(255,255,255,0.04) 1px,
        transparent 1px,
        transparent 8px
      );
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
      color: #fff;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .header-text { position: relative; z-index: 1; }

    .header-text h1 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.2px;
      line-height: 1.2;
    }

    .header-text p {
      font-size: 12px;
      color: rgba(255,255,255,0.75);
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 2px;
    }

    .online-dot {
      width: 7px;
      height: 7px;
      background: #7aed9f;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── QUICK CHIPS ── */
    .chips {
      background: var(--cream);
      padding: 10px 16px;
      display: flex;
      gap: 7px;
      overflow-x: auto;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }

    .chips::-webkit-scrollbar { display: none; }

    .chip {
      background: var(--white);
      border: 1px solid var(--border);
      color: var(--pink);
      font-size: 12px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s, border-color .15s, color .15s;
      font-family: 'DM Sans', sans-serif;
    }

    .chip:hover {
      background: var(--pink-pale);
      border-color: var(--pink);
      color: var(--scarlet);
    }

    /* ── CHAT AREA ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: var(--cream);
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-thumb { background: var(--pink-light); border-radius: 4px; }

    .msg-group { display: flex; flex-direction: column; gap: 2px; margin-bottom: 8px; }

    .msg-label {
      font-size: 11px;
      color: var(--text-muted);
      padding: 0 4px;
      margin-bottom: 3px;
    }

    .msg-label.user { text-align: right; }

    .bubble {
      max-width: 80%;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.55;
      word-wrap: break-word;
      animation: popIn .2s ease both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.94); }
      to   { opacity: 1; transform: scale(1); }
    }

    .bot-bubble {
      background: var(--white);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 18px 18px 18px 4px;
      align-self: flex-start;
    }

    .user-bubble {
      background: var(--pink);
      color: #fff;
      border-radius: 18px 18px 4px 18px;
      align-self: flex-end;
    }

    /* ── TYPING INDICATOR ── */
    .typing-wrap { display: flex; flex-direction: column; gap: 2px; margin-bottom: 8px; }

    .typing-label {
      font-size: 11px;
      color: var(--text-muted);
      padding: 0 4px;
      margin-bottom: 3px;
    }

    .typing {
      display: flex;
      gap: 5px;
      padding: 12px 16px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 18px 18px 18px 4px;
      align-self: flex-start;
      width: fit-content;
    }

    .typing span {
      width: 7px;
      height: 7px;
      background: var(--pink-light);
      border-radius: 50%;
      animation: bounce .9s infinite;
    }

    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .3s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-7px); }
    }

    /* ── FOOTER ── */
    footer {
      padding: 12px 14px;
      background: var(--white);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }

    #input {
      flex: 1;
      padding: 10px 16px;
      border: 1.5px solid var(--border);
      border-radius: 22px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
      outline: none;
      transition: border-color .2s;
    }

    #input::placeholder { color: var(--text-muted); }
    #input:focus { border-color: var(--pink); background: var(--white); }

    #send {
      background: var(--scarlet);
      color: #fff;
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .15s, transform .1s;
    }

    #send:hover  { background: var(--scarlet-dk); }
    #send:active { transform: scale(0.93); }

    #send svg { width: 18px; height: 18px; }

    /* ── DATE DIVIDER ── */
    .divider {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin: 6px 0 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
  </style>
</head>
<body>

<div class="chat-card">

  <header>
    <div class="avatar">S</div>
    <div class="header-text">
      <h1>UPSA SmartBiz Chat</h1>
      <p><span class="online-dot"></span> Online — here to help</p>
    </div>
  </header>

  <div class="chips">
    <button class="chip" onclick="quickSend('What is the price?')">Price</button>
    <button class="chip" onclick="quickSend('Where are you located?')">Location</button>
    <button class="chip" onclick="quickSend('How does delivery work?')">Delivery</button>
    <button class="chip" onclick="quickSend('How can I pay?')">Payment</button>
    <button class="chip" onclick="quickSend('What are your hours?')">Hours</button>
  </div>

  <div id="chat">
    <div class="divider">Today</div>
  </div>

  <footer>
    <input id="input" type="text" placeholder="Ask about price, location, delivery…" autocomplete="off" />
    <button id="send" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </footer>

</div>

<script>
  const chat   = document.getElementById('chat');
  const input  = document.getElementById('input');
  const sendBtn = document.getElementById('send');

  const KB = {
    price:    { keys: ['price','cost','how much','ghs','fee','charge','expensive','cheap'], reply: "Our products range from GHS 50–150. We have great options for every budget! 🛍️" },
    location: { keys: ['location','where','find you','address','campus','upsa'], reply: "We're right here on UPSA campus! Come say hi between lectures — we'd love to meet you. 📍" },
    delivery: { keys: ['delivery','deliver','shipping','ship','bring','send'], reply: "Delivery takes 1–2 days within Accra, Monday to Saturday. We'll keep you updated! 🚚" },
    payment:  { keys: ['pay','payment','momo','mobile money','cash','transfer','bank'], reply: "We accept MTN MoMo, Vodafone Cash, cash, and bank transfer. Super convenient! 💳" },
    hours:    { keys: ['hours','open','time','available','when','close'], reply: "We're available Mon–Fri 8am–6pm and Saturdays 9am–3pm. Sundays we rest! ⏰" },
    contact:  { keys: ['contact','whatsapp','call','instagram','social','reach'], reply: "Find us on Instagram and WhatsApp for quick replies. Check our bio for the links! 📱" },
    hello:    { keys: ['hi','hello','hey','good morning','good afternoon','good evening','hola'], reply: "Hey there! 👋 Great to hear from you. Ask me anything about price, location, delivery, or payments!" },
    thanks:   { keys: ['thanks','thank you','thank','appreciate','great','awesome','perfect'], reply: "You're very welcome! 😊 Anything else I can help you with?" },
  };

  function getReply(text) {
    const t = text.toLowerCase();
    for (const { keys, reply } of Object.values(KB)) {
      if (keys.some(k => t.includes(k))) return reply;
    }
    return "Sorry, I didn't quite get that! 😊 Try asking about price, location, delivery, payment, or our hours.";
  }

  function addBotMsg(text) {
    const group = document.createElement('div');
    group.className = 'msg-group';

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = 'SmartBiz Bot';

    const bubble = document.createElement('div');
    bubble.className = 'bubble bot-bubble';
    bubble.textContent = text;

    group.appendChild(label);
    group.appendChild(bubble);
    chat.appendChild(group);
    chat.scrollTop = chat.scrollHeight;
  }

  function addUserMsg(text) {
    const group = document.createElement('div');
    group.className = 'msg-group';
    group.style.alignItems = 'flex-end';

    const label = document.createElement('div');
    label.className = 'msg-label user';
    label.textContent = 'You';

    const bubble = document.createElement('div');
    bubble.className = 'bubble user-bubble';
    bubble.textContent = text;

    group.appendChild(label);
    group.appendChild(bubble);
    chat.appendChild(group);
    chat.scrollTop = chat.scrollHeight;
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'typing-wrap';
    wrap.id = 'typing';

    const label = document.createElement('div');
    label.className = 'typing-label';
    label.textContent = 'SmartBiz Bot';

    const dots = document.createElement('div');
    dots.className = 'typing';
    dots.innerHTML = '<span></span><span></span><span></span>';

    wrap.appendChild(label);
    wrap.appendChild(dots);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function handleSend(text) {
    const msg = (text || input.value).trim();
    if (!msg) return;
    input.value = '';
    addUserMsg(msg);
    showTyping();
    setTimeout(() => {
      removeTyping();
      addBotMsg(getReply(msg));
    }, 750);
  }

  function quickSend(text) {
    handleSend(text);
  }

  sendBtn.addEventListener('click', () => handleSend());
  input.addEventListener('keydown', e => { if (e.key === 'Enter') handleSend(); });

  // Welcome message
  setTimeout(() => {
    addBotMsg("Hi there! 👋 Welcome to UPSA SmartBiz Chat. I'm here to help with your questions. Ask me about price, delivery, location, or payments!");
  }, 400);
</script>

</body>
</html>
