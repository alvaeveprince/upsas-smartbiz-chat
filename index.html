<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glow Studio — Skincare Advisor</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --blush: #f5c6c6;
    --rose: #e8a0a0;
    --deep-rose: #c97474;
    --cream: #fdf8f5;
    --warm-white: #fff9f7;
    --petal: #fce8e8;
    --sage: #b8c9b8;
    --dark: #2c1f1f;
    --mid: #7a5c5c;
    --light-mid: #c4a0a0;
    --surface: #ffffff;
    --shadow: rgba(180, 100, 100, 0.10);
    --user-bubble: linear-gradient(135deg, #e8a0a0, #d47878);
    --bot-bubble: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Background blobs */
  body::before {
    content: '';
    position: fixed;
    top: -120px; right: -120px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, #f5c6c6 0%, transparent 70%);
    opacity: 0.5;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -100px; left: -100px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, #fce8e8 0%, transparent 70%);
    opacity: 0.6;
    pointer-events: none;
    z-index: 0;
  }

  /* App Shell */
  .app {
    width: 100%;
    max-width: 430px;
    height: 100vh;
    max-height: 860px;
    display: flex;
    flex-direction: column;
    background: var(--warm-white);
    border-radius: 32px;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(180, 100, 100, 0.18), 0 4px 16px rgba(0,0,0,0.06);
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #f9dede 0%, #fce8e8 50%, #f5d5d5 100%);
    padding: 20px 22px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid rgba(200, 140, 140, 0.15);
    position: relative;
    flex-shrink: 0;
  }
  .header-avatar {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: linear-gradient(135deg, #e8a0a0, #c97474);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 4px 14px rgba(200, 120, 120, 0.3);
    flex-shrink: 0;
  }
  .header-info { flex: 1; }
  .header-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 19px;
    font-weight: 600;
    color: var(--dark);
    letter-spacing: 0.3px;
    line-height: 1.2;
  }
  .header-status {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; color: var(--mid); font-weight: 400; margin-top: 2px;
  }
  .status-dot {
    width: 7px; height: 7px;
    background: #6cc87d; border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .header-badge {
    font-size: 10px; font-weight: 600;
    background: var(--deep-rose);
    color: white; padding: 3px 9px; border-radius: 20px;
    letter-spacing: 0.5px; text-transform: uppercase;
  }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }
  .chat-area::-webkit-scrollbar { width: 3px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--blush); border-radius: 10px; }

  /* Date divider */
  .date-divider {
    text-align: center;
    font-size: 11px; color: var(--light-mid);
    display: flex; align-items: center; gap: 8px;
    margin: 4px 0;
  }
  .date-divider::before, .date-divider::after {
    content: ''; flex: 1;
    height: 1px; background: var(--blush);
  }

  /* Messages */
  .message-row {
    display: flex; align-items: flex-end; gap: 8px;
    animation: slideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .message-row.user { flex-direction: row-reverse; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .bot-icon {
    width: 30px; height: 30px; border-radius: 50%;
    background: linear-gradient(135deg, #e8a0a0, #c97474);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0; margin-bottom: 2px;
  }

  .bubble-wrap { max-width: 80%; display: flex; flex-direction: column; gap: 3px; }
  .message-row.user .bubble-wrap { align-items: flex-end; }

  .bubble {
    padding: 12px 16px;
    border-radius: 20px;
    font-size: 14px; line-height: 1.55;
    color: var(--dark);
    position: relative;
    word-break: break-word;
  }
  .bubble.bot {
    background: var(--surface);
    border-radius: 4px 20px 20px 20px;
    box-shadow: 0 2px 12px var(--shadow);
  }
  .bubble.user {
    background: var(--user-bubble);
    color: white;
    border-radius: 20px 4px 20px 20px;
    box-shadow: 0 2px 12px rgba(200, 120, 120, 0.3);
  }
  .bubble.user a { color: rgba(255,255,255,0.9); }
  .bubble a { color: var(--deep-rose); text-decoration: none; font-weight: 500; }
  .bubble a:hover { text-decoration: underline; }

  .msg-time {
    font-size: 10px; color: var(--light-mid); padding: 0 4px;
  }

  /* Typing indicator */
  .typing-row {
    display: flex; align-items: flex-end; gap: 8px;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .typing-bubble {
    background: var(--surface);
    border-radius: 4px 20px 20px 20px;
    padding: 12px 18px;
    box-shadow: 0 2px 12px var(--shadow);
    display: flex; gap: 5px; align-items: center;
  }
  .typing-dot {
    width: 7px; height: 7px;
    background: var(--rose);
    border-radius: 50%;
    animation: bounce 1.2s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  /* Quick Reply Buttons */
  .quick-replies {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-top: 6px;
    animation: slideIn 0.35s ease;
  }
  .qr-btn {
    background: var(--warm-white);
    border: 1.5px solid var(--blush);
    color: var(--dark);
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: 'DM Sans', sans-serif;
    line-height: 1.2;
  }
  .qr-btn:hover {
    background: var(--petal);
    border-color: var(--rose);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(200, 120, 120, 0.15);
  }
  .qr-btn:active { transform: scale(0.97); }

  /* Product card */
  .product-card {
    background: linear-gradient(135deg, #fdf5f5, #fff9f7);
    border: 1px solid rgba(200, 140, 140, 0.2);
    border-radius: 16px;
    padding: 12px 14px;
    margin: 4px 0;
    box-shadow: 0 2px 10px rgba(180,100,100,0.07);
  }
  .product-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px; font-weight: 600;
    color: var(--dark); margin-bottom: 3px;
  }
  .product-benefit {
    font-size: 12.5px; color: var(--mid); line-height: 1.45; margin-bottom: 6px;
  }
  .product-price {
    font-size: 14px; font-weight: 600;
    color: var(--deep-rose);
    display: flex; align-items: center; gap: 6px;
  }
  .price-badge {
    background: var(--petal); color: var(--deep-rose);
    font-size: 10px; padding: 2px 7px; border-radius: 10px;
    font-weight: 500;
  }

  /* Info block */
  .info-block {
    background: linear-gradient(135deg, #fdf5f5, #fff9f7);
    border-left: 3px solid var(--rose);
    border-radius: 0 14px 14px 0;
    padding: 12px 14px;
    margin: 4px 0; font-size: 13.5px; line-height: 1.7;
    color: var(--dark);
  }
  .info-block strong { color: var(--deep-rose); font-weight: 600; }

  /* Input area */
  .input-area {
    padding: 12px 16px 18px;
    background: var(--warm-white);
    border-top: 1px solid rgba(200, 140, 140, 0.12);
    display: flex; gap: 10px; align-items: flex-end;
    flex-shrink: 0;
  }
  .input-wrap { flex: 1; position: relative; }
  #userInput {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--blush);
    border-radius: 24px;
    background: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; color: var(--dark);
    outline: none;
    resize: none;
    transition: border-color 0.2s;
    max-height: 100px;
    line-height: 1.5;
  }
  #userInput:focus { border-color: var(--rose); }
  #userInput::placeholder { color: var(--light-mid); }
  .send-btn {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: linear-gradient(135deg, #e8a0a0, #c97474);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(200, 120, 120, 0.35);
    transition: all 0.2s ease;
    flex-shrink: 0;
  }
  .send-btn:hover { transform: scale(1.06); box-shadow: 0 6px 18px rgba(200, 120, 120, 0.45); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn svg { fill: white; width: 18px; height: 18px; }

  /* Responsive */
  @media (max-width: 440px) {
    body { align-items: flex-end; background: var(--warm-white); }
    .app { max-height: 100vh; border-radius: 28px 28px 0 0; box-shadow: 0 -8px 40px rgba(180,100,100,0.15); }
  }
</style>
</head>
<body>

<div class="app">

</div>

const concerns = {

    title: "Acne-Prone Skin",
    message: "Here are the best products to help combat acne and breakouts:",

  },
  "🌟 Dull Skin": {
    title: "Dull Skin & Uneven Tone",
    message: "Brighten and renew your skin with these glow-getters:",

    routine: "🌿 <strong>Routine tip:</strong> Use Glycolic Acid toner at night and Vitamin C in the morning."
  },
  "🕰️ Fine Lines": {
    title: "Fine Lines & Aging",
    message: "Fight signs of aging with these science-backed formulas:",
    picks: [products.antiAging[0], products.antiAging[1]],
    routine: "🌿 <strong>Routine tip:</strong> Apply Argireline in the morning and Matrixyl at night for best results."
  }
};

// ─── CHAT ENGINE ────────────────────────────────────────────────────
const chatArea = document.getElementById('chatArea');
const userInput = document.getElementById('userInput');
let isTyping = false;

function getTime() {
  return new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}

function addBotMessage(content, delay = 0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const row = document.createElement('div');
      row.className = 'message-row';
      row.innerHTML = `
        <div class="bot-icon">🌸</div>
        <div class="bubble-wrap">
          <div class="bubble bot">${content}</div>
          <span class="msg-time">${getTime()}</span>
        </div>`;
      chatArea.appendChild(row);
      scrollBottom();
      resolve();
    }, delay);
  });
}

function addUserMessage(text) {
  const row = document.createElement('div');
  row.className = 'message-row user';
  row.innerHTML = `
    <div class="bubble-wrap">
      <div class="bubble user">${text}</div>
      <span class="msg-time">${getTime()}</span>
    </div>`;
  chatArea.appendChild(row);
  scrollBottom();
}

function addQuickReplies(options, callback) {
  const wrap = document.createElement('div');
  wrap.className = 'quick-replies';
  wrap.id = 'quickReplies';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = opt;
    btn.onclick = () => {
      document.querySelectorAll('.qr-btn').forEach(b => b.disabled = true);
      wrap.style.opacity = '0.5';
      wrap.style.pointerEvents = 'none';
      addUserMessage(opt);
      setTimeout(() => callback(opt), 200);
    };
    wrap.appendChild(btn);
  });
  chatArea.appendChild(wrap);
  scrollBottom();
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'typing-row';
  row.id = 'typingIndicator';
  row.innerHTML = `
    <div class="bot-icon">🌸</div>
    <div class="typing-bubble">
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
    </div>`;
  chatArea.appendChild(row);
  scrollBottom();
}

function hideTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

async function botReply(contentFn, typingMs = 1200) {
  showTyping();
  await new Promise(r => setTimeout(r, typingMs));
  hideTyping();
  await contentFn();
}

function scrollBottom() {
  setTimeout(() => chatArea.scrollTop = chatArea.scrollHeight, 50);
}

function productCardHTML(p) {
  return `<div class="product-card">
    <div class="product-name">${p.name}</div>
    <div class="product-benefit">${p.benefit}</div>
    <div class="product-price">${p.price} <span class="price-badge">In Stock</span></div>
  </div>`;
}

// ─── MAIN MENU ──────────────────────────────────────────────────────
function showMainMenu() {
  addQuickReplies([
    "🧴 View Products",
    "🧠 Skin Concerns",
    "💰 Prices & Discounts",
    "🚚 Delivery Info",
    "💳 Payment Methods",
    "📍 Location",
    "📞 Contact / WhatsApp"
  ], handleMainMenu);
}

async function handleMainMenu(choice) {
  if (choice.includes("View Products")) await handleViewProducts();
  else if (choice.includes("Skin Concerns")) await handleSkinConcerns();
  else if (choice.includes("Prices")) await handlePrices();
  else if (choice.includes("Delivery")) await handleDelivery();
  else if (choice.includes("Payment")) await handlePayment();
  else if (choice.includes("Location")) await handleLocation();
  else if (choice.includes("Contact")) await handleContact();
}

// ─── HANDLERS ───────────────────────────────────────────────────────
async function handleViewProducts() {
  await botReply(async () => {
    await addBotMessage("We carry a curated range of <strong>The Ordinary</strong> products. Which category interests you?");
    addQuickReplies([
      "🧼 Cleansers",
      "💧 Hydration",
      "🔴 Acne / Oily Skin",
      "✨ Brightening",
      "🌀 Exfoliation",
      "🕰️ Anti-Aging",
      "👁️ Eye Care",
      "🌿 Oils",
      "← Back to Menu"
    ], handleCategory);
  });
}

      if (c.includes("Another")) handleViewProducts();
      else if (c.includes("Skin")) handleSkinConcerns();
      else { await botReply(async () => { await a! 💳" },

    contact:  { keys: ['contact','whatsapp','call','instagram','social','reach'], reply: "Find us on Instagram and WhatsApp for quick replies. Check our bio for the links! 📱" },
    hello:    { keys: ['hi','hello','hey','good morning','good afternoon','good evening','hola'], reply: "Hey there! 👋 Great to hear from you. Ask me anything about price, location, delivery, or payments!" },
    thanks:   { keys: ['thanks','thank you','thank','appreciate','great','awesome','perfect'], reply: "You're very welcome! 😊 Anything else I can help you with?" },
  };

  function getReply(text) {
    const t = text.toLowerCase();
    for (const { keys, reply } of Object.values(KB)) {
      if (keys.some(k => t.includes(k))) return reply;
    }
    return "Sorry, I didn't quite get that! 😊 Try asking about price, location, delivery, payment, or our hours.";
  }

  function addBotMsg(text) {
    const group = document.createElement('div');
    group.className = 'msg-group';

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = 'SmartBiz Bot';

    const bubble = document.createElement('div');
    bubble.className = 'bubble bot-bubble';
    bubble.textContent = text;

    group.appendChild(label);
    group.appendChild(bubble);
    chat.appendChild(group);
    chat.scrollTop = chat.scrollHeight;
  }

  function addUserMsg(text) {
    const group = document.createElement('div');
    group.className = 'msg-group';
    group.style.alignItems = 'flex-end';

    const label = document.createElement('div');
    label.className = 'msg-label user';
    label.textContent = 'You';

    const bubble = document.createElement('div');
    bubble.className = 'bubble user-bubble';
    bubble.textContent = text;

    group.appendChild(label);
    group.appendChild(bubble);
    chat.appendChild(group);
    chat.scrollTop = chat.scrollHeight;
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'typing-wrap';
    wrap.id = 'typing';

    const label = document.createElement('div');
    label.className = 'typing-label';
    label.textContent = 'SmartBiz Bot';

    const dots = document.createElement('div');
    dots.className = 'typing';
    dots.innerHTML = '<span></span><span></span><span></span>';

    wrap.appendChild(label);
    wrap.appendChild(dots);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function handleSend(text) {
    const msg = (text || input.value).trim();
    if (!msg) return;
    input.value = '';
    addUserMsg(msg);
    showTyping();
    setTimeout(() => {
      removeTyping();
      addBotMsg(getReply(msg));
    }, 750);
  }

  function quickSend(text) {
    handleSend(text);
  }

  sendBtn.addEventListener('click', () => handleSend());
  input.addEventListener('keydown', e => { if (e.key === 'Enter') handleSend(); });

  // Welcome message
  setTimeout(() => {
    addBotMsg("Hi there! 👋 Welcome to UPSA SmartBiz Chat. I'm here to help with your questions. Ask me about price, delivery, location, or payments!");
  }, 400);
</script>

</body>
</html>
